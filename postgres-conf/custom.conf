# BotNode PostgreSQL Configuration
# Supplements the default postgresql.conf via -c config_file flag

# === Connection ===
listen_addresses = '*'
max_connections = 100
password_encryption = scram-sha-256

# === WAL & Archiving (PITR) ===
wal_level = replica
archive_mode = on
archive_command = 'test ! -f /var/lib/postgresql/wal_archive/%f && cp %p /var/lib/postgresql/wal_archive/%f'
archive_timeout = 3600
max_wal_size = 256MB
min_wal_size = 64MB
wal_buffers = 4MB

# === Memory (2 vCPU / 8GB RAM) ===
shared_buffers = 128MB
effective_cache_size = 512MB
work_mem = 4MB
maintenance_work_mem = 64MB

# === Logging ===
log_min_duration_statement = 1000
log_checkpoints = on
log_lock_waits = on
